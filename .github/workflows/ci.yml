name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest --tb=short -q

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install pyright
      - name: Pyright type check (core modules)
        run: pyright packages/shared/db/models.py packages/shared/auth.py packages/shared/idempotency.py packages/shared/observability.py packages/survey_analysis/plugin_contract.py packages/survey_analysis/result_schemas.py
        continue-on-error: true  # advisory until full typing is adopted

  security-scan:
    name: Security & Dependency Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install pip-audit
      - name: pip-audit (known vulnerabilities)
        run: pip-audit --strict --desc
      - name: Dependency freshness check
        run: python scripts/check_deps.py

  schema-check:
    name: Schema & Migration Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Verify migrations apply cleanly
        run: |
          python -c "
          from packages.shared.db.migrate import run_upgrade, get_current_revision
          run_upgrade(db_url='sqlite:///ci_test.db')
          rev = get_current_revision(db_url='sqlite:///ci_test.db')
          assert rev is not None, 'Migration failed: no revision after upgrade'
          print(f'Migration OK: revision {rev}')
          "
      - name: ADR validation
        run: python scripts/check_adr.py
      - name: CI quality gates
        run: python scripts/check_ci_gates.py
