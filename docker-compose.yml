services:
  api:
    build:
      context: .
      target: backend
    ports:
      - "${API_PORT:-8010}:8010"
    env_file: .env
    environment:
      # Override for Docker — SQLite in a named volume; swap for Postgres in production
      - DATABASE_URL=sqlite:///./data/quant_platform.db
      - API_HOST=0.0.0.0
      - API_PORT=8010
    volumes:
      - db-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      target: frontend
    ports:
      - "${WEB_PORT:-8510}:8510"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db-data:
